name: inkflow
description: A note-taking app with no artificial limitations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────
  flutter_riverpod: ^2.5.1


  # ── Navigation ───────────────────────────────────────────
  go_router: ^14.2.0

  # ── Dependency Injection ─────────────────────────────────
  get_it: ^7.7.0
  # ── Database (note metadata) ─────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # ── Stroke Rendering (Phase 1) ───────────────────────────
  perfect_freehand: ^2.5.1

  # ── PDF Rendering (Phase 4) ──────────────────────────────
  pdfx: ^2.6.0

  # ── Image Import (Phase 4) ───────────────────────────────
  image_picker: ^1.1.2
  image: ^4.2.0

  # ── Vector Shapes (Phase 5) ──────────────────────────────
  flutter_svg: ^2.3.0

  # ── Export & Share (Phase 2) ─────────────────────────────
  printing: ^5.13.1
  share_plus: 12.0.2
  file_picker: ^8.3.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code generation ───────────────────────────────────────
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1

  # ── Testing ───────────────────────────────────────────────
  mocktail: ^1.0.4

flutter:
  uses-material-design: true