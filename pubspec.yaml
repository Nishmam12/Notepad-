name: inkflow
description: A note-taking app with no artificial limitations.
publish_to: 'none'
# Single source of truth for the app version.
# Format: <major>.<minor>.<patch>+<build>. The +<build> counter is
# auto-incremented on every push to main by the GitHub Actions workflow
# .github/workflows/version-bump.yml (no local setup needed for collaborators).
# Bump the semantic <major>.<minor>.<patch> by hand (and add a CHANGELOG.md
# entry) when a change warrants it. The running app reads this via
# package_info_plus, so the "About" screen always shows what's installed.
version: 1.0.2+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────
  flutter_riverpod: ^2.5.1


  # ── Navigation ───────────────────────────────────────────
  go_router: ^14.2.0

  # ── Dependency Injection ─────────────────────────────────
  get_it: ^7.7.0
  # ── Database (note metadata) ─────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # ── App metadata (reads version/build from pubspec at runtime) ──
  package_info_plus: ^8.0.0

  # ── Stroke Rendering (Phase 1) ───────────────────────────
  perfect_freehand: ^2.5.1

  # ── PDF Rendering (Phase 4) ──────────────────────────────
  pdfx: ^2.6.0

  # ── Image Import (Phase 4) ───────────────────────────────
  image_picker: ^1.1.2
  image: ^4.2.0

  # ── Vector Shapes (Phase 5) ──────────────────────────────
  flutter_svg: ^2.3.0

  # ── Export & Share (Phase 2) ─────────────────────────────
  printing: ^5.13.1
  share_plus: 12.0.2
  file_picker: ^8.3.7
  pdf: ^3.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code generation ───────────────────────────────────────
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1

  # ── Testing ───────────────────────────────────────────────
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf